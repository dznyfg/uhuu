name: Build Impressao Electron

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
  workflow_dispatch:

jobs:
  validar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Verificacao de build
        run: npm run verificar

  build-windows:
    runs-on: windows-latest
    needs: validar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build Windows
        run: npm run empacotar:win

      - name: Upload artefatos
        uses: actions/upload-artifact@v4
        with:
          name: top-lanches-impressao-windows
          path: |
            release/*.exe
            release/*.msi
